x-default-policy: &default_policy
  restart: unless-stopped
  logging:
    driver: loki
    options:
      loki-url: http://loki:3100/loki/api/v1/push

services:
  grafana:
    <<: *default_policy
    container_name: grafana
    image: grafana/grafana:12.4.2@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - 3000:3000
  loki:
    <<: *default_policy
    container_name: loki
    image: grafana/loki:3.6.7@sha256:3c8fd3570dd9219951a60d3f919c7f31923d10baee578b77bc26c4a0b32d092d
    ports:
      - 127.0.0.1:3100:3100
    volumes:
      - loki-data:/loki
  prometheus:
    <<: *default_policy
    container_name: prometheus
    image: prom/prometheus:v2.54.0@sha256:497fe921f22fea8535fa2bcb1c193dacc6ce98c08274257b3d18a4eaae0f9647
    command: "--config.file=/etc/prometheus/prometheus.yaml --web.config.file=/etc/prometheus/web.yaml --storage.tsdb.retention.size=80GB"
    volumes:
      - prometheus-data:/etc/prometheus/data/
    healthcheck:
      interval: "30s"
      timeout: "1m30s"
      retries: 10
      start_period: "10s"
      test: ["CMD", "wget", "http://localhost:9090"]
  https-portal:
    <<: *default_policy
    container_name: https-portal
    image: steveltn/https-portal:1@sha256:945b1a6fe1e2496fc8f0535a4121b2ab8e68b187b8fcdc50dacc2faf6589edd3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - https-portal-data:/var/lib/https-portal
    environment:
      WEBSOCKET: "true"
    depends_on:
      - grafana
      - prometheus
      - loki

volumes:
  grafana-data:
    external: true
  loki-data:
    external: true
  prometheus-data:
    external: true
  https-portal-data:
