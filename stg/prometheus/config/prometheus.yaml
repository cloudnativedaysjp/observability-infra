---
global:
  scrape_interval: 1m

scrape_configs:
  - job_name: loki-node
    static_configs:
      - targets:
          - loki:3100
  - job_name: prometheus-node
    static_configs:
      - targets:
          - node-exporter:9100
  - job_name: dreamkast
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - staging.dev.cloudnativedays.jp
  - job_name: dk-weaver
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - dkw.dev.cloudnativedays.jp
